name: Price Monitor

on:
  schedule:
    - cron: '30 14 * * *'    # daily at 14:30 UTC (6:30am PST), 30min after digest
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prices:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run price monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node scripts/price-monitor.js

      - name: Commit updated price history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/price-history.json
          git diff --staged --quiet || (git commit -m "chore: update price history [skip ci]" && git push)
